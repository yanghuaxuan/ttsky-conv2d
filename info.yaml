# Tiny Tapeout project information
project:
  title:        "Conv2D"      # Project title
  author:       "Jason Yang"      # Your name
  discord:      ".pogeg"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A simple 3x3 convolution implementation with all one kernel with 14 bit output"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_yanghuaxuan_conv2d"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "delaybuffer.sv"
    - "ram_1r1w_sync.sv"
    - "conv2d.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "data_i[0]"  # Example: "data_i[0]"
  ui[1]: "data_i[1]"  # Example: "data_i[1]"
  ui[2]: "data_i[2]"  # Example: "data_i[2]"
  ui[3]: "data_i[3]"  # Example: "data_i[3]"
  ui[4]: "data_i[4]"  # Example: "data_i[4]"
  ui[5]: "data_i[5]"  # Example: "data_i[5]"
  ui[6]: "data_i[6]"  # Example: "valid_i"
  ui[7]: "data_i[7]"  # Example: "clk"

  # Outputs
  uo[0]: "conv2d_data_o[2]"  # Example: "data_o[0]"
  uo[1]: "conv2d_data_o[3]"  # Example: "data_o[1]"
  uo[2]: "conv2d_data_o[4]"  # Example: "data_o[2]"
  uo[3]: "conv2d_data_o[5]"  # Example: "data_o[3]"
  uo[4]: "conv2d_data_o[6]"  # Example: "data_o[4]"
  uo[5]: "conv2d_data_o[7]"  # Example: "data_o[5]"
  uo[6]: "conv2d_data_o[8]"  # Example: "data_o[6]"
  uo[7]: "conv2d_data_o[9]"  # Example: "data_o[7]"

  # Bidirectional pins
  uio[0]: "conv2d_data_o[10]"
  uio[1]: "conv2d_data_o[11]"
  uio[2]: "conv2d_data_o[12]"
  uio[3]: "conv2d_data_o[13]"
  uio[4]: "conv2d_data_o[14]"
  uio[5]: "conv2d_data_o[15]"
  uio[6]: "valid_i"
  uio[7]: "valid_o"

# Do not change!
yaml_version: 6
